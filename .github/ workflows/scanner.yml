name: Oscar Job Scanner

on:
  schedule:
    - cron: "0 */2 * * *"   # toutes les 2 heures
  workflow_dispatch:          # déclenchement manuel aussi possible

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install feedparser requests python-dotenv

      - name: Restaurer seen_posts.json (cache)
        uses: actions/cache@v4
        with:
          path: seen_posts.json
          key: seen-posts-${{ github.run_id }}
          restore-keys: seen-posts-

      - name: Lancer le scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALERT_RSS_1: ${{ secrets.ALERT_RSS_1 }}
          ALERT_RSS_2: ${{ secrets.ALERT_RSS_2 }}
          ALERT_RSS_3: ${{ secrets.ALERT_RSS_3 }}
          ALERT_RSS_4: ${{ secrets.ALERT_RSS_4 }}
          ALERT_RSS_5: ${{ secrets.ALERT_RSS_5 }}
        run: python scanner.py
